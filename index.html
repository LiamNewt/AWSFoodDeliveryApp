<!doctype html>
<div class="outerContainer">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js"></script>

    <title>Food Order Application</title>
  </head>

  <body>
    <h1>Food Order Application</h1>
    <section class="enterName">
      <h3>Place an order:</h3>
      <input
        type="text"
        id="name"
        placeholder="Enter your name here:"
        required
      /><br /><br />
    </section>

    <section>
      <div class="wrapper">
        <div class="category">
          <h3>Pizza</h3>
          <label>Choose an Item:</label>
          <select id="itemPizza">
            <option value="Select">Select Here:</option>
            <option value="Margherita">Margherita</option>
            <option value="Pepporoni">Pepporoni</option>
            <option value="Hawaiian">Hawaiian</option>
            <option value="MeatFeast">Meat Feast</option>
            <option value="BBQ Chicken">BBQ Chciken</option></select
          ><br /><br />
        </div>
        <div class="category">
          <h3>Burgers</h3>
          <label>Choose an Item:</label>
          <select id="itemBurger">
            <option value="Select">Select Here:</option>
            <option value="Cheese">Cheese Burger</option>
            <option value="ChcikenFillet">Chicken Fillet Burger</option>
            <option value="QuaterPounder">Quater Pounder</option>
            <option value="HalfPounder">Half Pounder</option>
            <option value="Veggie">Veggie Burger</option></select
          ><br /><br />
        </div>

        <div class="category">
          <h3>Chicken</h3>
          <label>Choose an Item:</label>
          <select id="itemChicken">
            <option value="Select">Select Here:</option>
            <option value="ChickenTenders">Chicken Tenders</option>
            <option value="ChcikenNuggets">Chicken Nuggets</option>
            <option value="ChcikenWings">Chicken Wings</option>
            <option value="ShreddedChicken">Shredded Chicken</option>
            <option value="5Piece">5 Piece Chicken</option></select
          ><br /><br />
        </div>

        <div class="category">
          <h3>Kebab</h3>
          <label>Choose an Item:</label>
          <select id="itemKebab">
            <option value="Select">Select Here:</option>
            <option value="DonerKebab">Doner Kebab</option>
            <option value="ChcikenTKebab">Chicken Tikka Kebab</option>
            <option value="ShishKebab">Shish Kebab</option>
            <option value="ChickenKebab">Chicken Kebab</option>
            <option value="VeggieKebab">veggie Kebab</option></select
          ><br /><br />
        </div>
      </div>
      <div class="buttonOrder">
        <button class="placeOrder" onclick="placeOrder()">
          Place Your Order
        </button>
      </div>
      <p id="orderResult"></p>
    </section>
    <h1>
      --------------------------------------------------------------------------------------------------------------------------------
    </h1>

    <section class="trackOrderSec">
      <h2>Track Your Order</h2>
      <input
        type="text"
        id="orderNum"
        placeholder="Enter your order number:"
      /><br /><br />
      <button class="orderTrack" onclick="trackOrder()">Track Order</button>
      <p id="orderStatus"></p>
    </section>
  </body>
</div>
